<!DOCTYPE html>
<html>
<head>
<title>Seven Wonders of the World</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
text-align:center;
}

h1{
color:#333;
margin:20px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:250px;
margin:15px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px gray;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:160px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:20px;
font-size:16px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<h1>Seven Wonders of the World</h1>

<div class="container">

<div class="card">
<img src="images/greatwall.jpg">
<h3>Great Wall of China</h3>
<p>China</p>
</div>

<div class="card">
<img src="images/petra.jpg">
<h3>Petra</h3>
<p>Jordan</p>
</div>

<div class="card">
<img src="images/christ.jpg">
<h3>Christ the Redeemer</h3>
<p>Brazil</p>
</div>

<div class="card">
<img src="images/machupicchu.jpg">
<h3>Machu Picchu</h3>
<p>Peru</p>
</div>

<div class="card">
<img src="images/chichenitza.jpg">
<h3>Chichen Itza</h3>
<p>Mexico</p>
</div>

<div class="card">
<img src="images/colosseum.jpg">
<h3>Colosseum</h3>
<p>Italy</p>
</div>

<div class="card">
<img src="images/tajmahal.jpg">
<h3>Taj Mahal</h3>
<p>India</p>
</div>

</div>

<button onclick="showFact()">Show Wonder Fact</button>

<script>

function showFact(){

var facts = [
"The Great Wall of China is over 21,000 km long.",
"Petra is famous for its rock-cut architecture.",
"Christ the Redeemer statue stands 30 meters tall.",
"Machu Picchu was built by the Inca civilization.",
"Chichen Itza pyramid is called El Castillo.",
"The Colosseum could hold around 50,000 spectators.",
"The Taj Mahal was built by Emperor Shah Jahan."
];

var random = Math.floor(Math.random()*facts.length);

alert(facts[random]);

}

</script>

</body>
</html>
